services:
  - type: web
    name: training-bot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WORKER_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MINIAPP_URL
        sync: false
      - key: DEFAULT_TIMEZONE
        value: Asia/Jerusalem
